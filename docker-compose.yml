# ============================================
# AI Study Assistant - Docker Compose
# ============================================
# 启动: docker-compose up -d
# 停止: docker-compose down
# 查看: docker-compose ps
# 日志: docker-compose logs -f [service]
# ============================================

services:
  # ---- PostgreSQL + pgvector ----
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-study-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_study
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?请在.env中设置DB_PASSWORD}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./sql/schema-pg.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./sql/data-pg.sql:/docker-entrypoint-initdb.d/02-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis 缓存 ----
  redis:
    image: redis:7-alpine
    container_name: ai-study-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-3002}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Spring Boot 后端 ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-study-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ai_study
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:?请在.env中设置DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AI_PROVIDER: ${AI_PROVIDER:-xfyun-spark}
      AI_BASE_URL: ${AI_BASE_URL:-https://spark-api-open.xf-yun.com/v1}
      AI_COMPLETIONS_PATH: ${AI_COMPLETIONS_PATH:-/chat/completions}
      AI_API_KEY: ${AI_API_KEY:?请在.env中设置AI_API_KEY}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-lite}
      AI_CHAT_TEMPERATURE: ${AI_CHAT_TEMPERATURE:-0.7}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:?请在.env中设置DASHSCOPE_API_KEY}
      DASHSCOPE_VL_BASE_URL: ${DASHSCOPE_VL_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      DASHSCOPE_VL_MODEL: ${DASHSCOPE_VL_MODEL:-qwen-vl-plus}
      JWT_SECRET: ${JWT_SECRET:?请在.env中设置JWT_SECRET}
      XFYUN_APP_ID: ${XFYUN_APP_ID:?请在.env中设置XFYUN_APP_ID}
      XFYUN_API_KEY: ${XFYUN_API_KEY:?请在.env中设置XFYUN_API_KEY}
      XFYUN_API_SECRET: ${XFYUN_API_SECRET:?请在.env中设置XFYUN_API_SECRET}
      XFYUN_IMAGE_PROVIDER: hidream
      XFYUN_IMAGE_TIMEOUT_MS: ${XFYUN_IMAGE_TIMEOUT_MS:-180000}
      FILE_UPLOAD_DIR: /app/uploads
      AI_KNOWLEDGE_BANK_ROOT: /app/resources/knowledge-bank
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - uploads_data:/app/uploads
      - ./backend/src/main/resources/knowledge-bank:/app/resources/knowledge-bank:ro

  # ---- Vue3 前端 ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-study-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  pgvector_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
