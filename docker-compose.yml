# ============================================
# AI Study Assistant - Docker Compose
# ============================================
# 启动: docker-compose up -d
# 停止: docker-compose down
# 查看: docker-compose ps
# 日志: docker-compose logs -f [service]
# ============================================

services:
  # ---- MySQL 数据库 ----
  mysql:
    image: mysql:8.0
    container_name: ai-study-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ai_study
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_general_ci
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./sql/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Spring Boot 后端 ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-study-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ai_study
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      FILE_UPLOAD_DIR: /app/uploads
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - uploads_data:/app/uploads

  # ---- Vue3 前端 ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-study-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local
