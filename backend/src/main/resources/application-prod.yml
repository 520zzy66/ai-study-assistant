# ============================================================
# 生产环境配置
# 所有敏感信息必须通过环境变量注入，禁止硬编码
# 必需环境变量：DB_USERNAME, DB_PASSWORD, DEEPSEEK_API_KEY
# ============================================================

# ---- 数据库（内网部署，SSL 由反向代理/网络层处理） ----
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:ai_study}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ---- Xiaomi MiMo API（从环境变量读取 Key） ----
  ai:
    openai:
      api-key: ${AI_API_KEY}
      base-url: https://token-plan-cn.xiaomimimo.com
      chat:
        options:
          model: mimo-v2.5

# ---- MyBatis-Plus（生产环境关闭 SQL 日志） ----
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  mapper-locations: classpath:mapper/*.xml

# ---- 日志级别（生产环境仅记录 WARN 及以上） ----
logging:
  level:
    com.study: INFO                                    # 项目代码 INFO
    org.springframework.ai: WARN                       # Spring AI 框架 WARN

# ---- Swagger（生产环境关闭） ----
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
