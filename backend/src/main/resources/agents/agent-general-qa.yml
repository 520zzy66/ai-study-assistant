# ============================================================
# 通用专家 Agent 配置
# 职责：回答 GeneralNode 无法直接处理、且不属于考公/考研的复杂问题
# ============================================================

id: general-qa
type: GENERAL_EXPERT
name: 通用专家
description: 处理跨学科、通用学习及其他复杂问题
icon: "🧠"
order: 3

model:
  base-url: ${AI_BASE_URL:${spring.ai.openai.base-url:https://spark-api-open.xf-yun.com/v1}}
  api-key: ${AI_API_KEY:${spring.ai.openai.api-key:}}
  model: ${AI_CHAT_MODEL:${spring.ai.openai.chat.options.model:lite}}
  temperature: 0.5

system-prompt-file: prompts/general-qa-system.txt
