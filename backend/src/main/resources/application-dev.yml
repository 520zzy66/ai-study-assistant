# ============================================================
# 开发环境配置
# 使用前请设置环境变量（或直接修改下方占位符）：
#   export DEEPSEEK_API_KEY=your_api_key_here
#   export JWT_SECRET=your_jwt_secret_here
#   export DB_USERNAME=root
#   export DB_PASSWORD=root
# ============================================================

# ---- 数据库 ----
spring:
  datasource:
    url: jdbc:mysql://localhost:${DB_PORT:3306}/ai_study?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456789zzy}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ---- DeepSeek API ----
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY}                     # DeepSeek API Key
      base-url: https://api.deepseek.com              # DeepSeek 接口地址
      chat:
        options:
          model: deepseek-v4-pro                       # 开发环境使用更高规格模型
          temperature: 0.7

# ---- 文件上传 ----
file:
  upload-dir: C:/Users/20370/Desktop/AI学习助手/backend/uploads

# ---- MyBatis-Plus ----
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开发环境打印 SQL 日志
  mapper-locations: classpath:mapper/*.xml

# ---- 日志级别（开发环境更详细） ----
logging:
  level:
    com.study: DEBUG                                   # 项目代码 DEBUG
    org.springframework.ai: DEBUG                      # Spring AI 框架 DEBUG

# ---- Swagger / OpenAPI 文档 ----
springdoc:
  api-docs:
    path: /api-docs                                    # OpenAPI JSON 地址
  swagger-ui:
    path: /swagger-ui.html                             # Swagger UI 页面
