# ============================================================
# 开发环境配置
# 使用前必须设置以下环境变量：
#   export JWT_SECRET=your_jwt_secret_here    # Base64 编码，≥256 位
#   export DB_PASSWORD=your_db_password
#   export AI_API_KEY=your_api_key_here
# 可选：DB_USERNAME（默认 postgres）、DB_PORT（默认 5433）、OLLAMA_BASE_URL
# ============================================================

# ---- JWT（开发环境默认值，生产环境必须通过环境变量覆盖） ----
jwt:
  secret: ${JWT_SECRET}

# ---- 数据库 ----
spring:
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5433}/ai_study
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # ---- OpenAI-compatible Chat API ----
  ai:
    openai:
      api-key: ${AI_API_KEY}
      base-url: ${AI_BASE_URL:https://spark-api-open.xf-yun.com/v1}
      chat:
        completions-path: ${AI_COMPLETIONS_PATH:/chat/completions}
        options:
          model: ${AI_CHAT_MODEL:lite}
          temperature: ${AI_CHAT_TEMPERATURE:0.7}

# ---- 文件上传 ----
file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}

xfyun:
  tts:
    enabled: ${XFYUN_TTS_ENABLED:true}
    app-id: ${XFYUN_TTS_APP_ID:${XFYUN_APP_ID:}}
    api-key: ${XFYUN_TTS_API_KEY:${XFYUN_API_KEY:}}
    api-secret: ${XFYUN_TTS_API_SECRET:${XFYUN_API_SECRET:}}
  image:
    enabled: ${XFYUN_IMAGE_ENABLED:true}
    app-id: ${XFYUN_IMAGE_APP_ID:${XFYUN_APP_ID:}}
    api-key: ${XFYUN_IMAGE_API_KEY:${XFYUN_API_KEY:}}
    api-secret: ${XFYUN_IMAGE_API_SECRET:${XFYUN_API_SECRET:}}
    provider: ${XFYUN_IMAGE_PROVIDER:hidream}
    endpoint: ${XFYUN_IMAGE_ENDPOINT:https://cn-huadong-1.xf-yun.com/v1/private/s3fd61810/create}
    hidream-query-endpoint: ${XFYUN_HIDREAM_QUERY_ENDPOINT:}
    model: ${XFYUN_IMAGE_MODEL:HiDream}
    default-size: ${XFYUN_IMAGE_DEFAULT_SIZE:1024x1024}

# ---- MyBatis-Plus ----
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开发环境打印 SQL 日志
  mapper-locations: classpath:mapper/*.xml

# ---- 日志级别（开发环境更详细） ----
logging:
  level:
    com.study: DEBUG                                   # 项目代码 DEBUG
    org.springframework.ai: DEBUG                      # Spring AI 框架 DEBUG

# ---- Swagger / OpenAPI 文档 ----
springdoc:
  api-docs:
    path: /api-docs                                    # OpenAPI JSON 地址
  swagger-ui:
    path: /swagger-ui.html                             # Swagger UI 页面
